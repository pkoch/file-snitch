name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  source:
    runs-on: ubuntu-24.04

    outputs:
      version: ${{ steps.version.outputs.version }}
      source_asset: ${{ steps.version.outputs.source_asset }}
      source_sha256: ${{ steps.source.outputs.source_sha256 }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "source_asset=file-snitch-$version-source.tar.gz" >> "$GITHUB_OUTPUT"
          test "$(cat VERSION)" = "$version"

      - id: source
        run: |
          out="$RUNNER_TEMP/${{ steps.version.outputs.source_asset }}"
          python3 ./scripts/release/build-release-source-tarball.py \
            --version "${{ steps.version.outputs.version }}" \
            --output "$out"
          sha="$(python3 ./scripts/release/sha256-file.py "$out")"
          echo "source_sha256=$sha" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: release-source
          path: ${{ runner.temp }}/${{ steps.version.outputs.source_asset }}
          if-no-files-found: error

  build:
    needs: source
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
            zig_target: x86_64-linux-gnu
            artifact_name: release-linux-x86_64
            asset_suffix: linux-x86_64
          - os: macos-15
            platform: macos-arm64
            zig_target: aarch64-macos
            artifact_name: release-macos-arm64
            asset_suffix: macos-arm64

    runs-on: ${{ matrix.os }}
    env:
      ZIG_INSTALL_DIR: ${{ github.workspace }}/.zig-toolchain/${{ matrix.platform }}
      ZIG_CACHE_DIR: ${{ github.workspace }}/.zig-cache
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-global-cache

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            fuse3 \
            libfuse3-dev \
            pkg-config

      - name: Extract pinned macFUSE SDK
        if: runner.os == 'macOS'
        run: |
          ./scripts/vendor/extract-macfuse-sdk.sh \
            --output "$RUNNER_TEMP/macfuse-sdk"

      - uses: ./.github/actions/setup-zig
        with:
          zig-install-dir: ${{ env.ZIG_INSTALL_DIR }}
          zig-cache-dir: ${{ env.ZIG_CACHE_DIR }}
          zig-global-cache-dir: ${{ env.ZIG_GLOBAL_CACHE_DIR }}

      - name: Download release source
        uses: actions/download-artifact@v4
        with:
          name: release-source
          path: ${{ runner.temp }}/source

      - name: Verify source checksum
        run: |
          asset="${{ needs.source.outputs.source_asset }}"
          cd "$RUNNER_TEMP/source"
          actual="$(python3 "${GITHUB_WORKSPACE}/scripts/release/sha256-file.py" "$asset")"
          test "$actual" = "${{ needs.source.outputs.source_sha256 }}"

      - name: Build twice and compare
        run: |
          asset="${{ needs.source.outputs.source_asset }}"
          source_dir="$RUNNER_TEMP/source"
          build_root="$RUNNER_TEMP/build"
          first_root="$build_root/first"
          second_root="$build_root/second"
          mkdir -p "$first_root" "$second_root"

          tar -xzf "$source_dir/$asset" -C "$first_root"
          tar -xzf "$source_dir/$asset" -C "$second_root"

          first_src="$first_root/file-snitch-${{ needs.source.outputs.version }}"
          second_src="$second_root/file-snitch-${{ needs.source.outputs.version }}"
          binary_asset="file-snitch-${{ needs.source.outputs.version }}-${{ matrix.asset_suffix }}.tar.gz"

          source_date_epoch="$(git show -s --format=%ct "$GITHUB_SHA")"

          (
            cd "$first_src"
            FILE_SNITCH_FUSE_INCLUDE_DIR="${RUNNER_TEMP}/macfuse-sdk/include" \
            FILE_SNITCH_FUSE_LIB_DIR="${RUNNER_TEMP}/macfuse-sdk/lib" \
            ZIG_BUILD_TARGET="${{ matrix.zig_target }}" \
            ./scripts/release/build-release-artifact.sh \
              --version "${{ needs.source.outputs.version }}" \
              --platform "${{ matrix.platform }}" \
              --source-date-epoch "$source_date_epoch" \
              --output "$RUNNER_TEMP/$binary_asset"
          )

          (
            cd "$second_src"
            FILE_SNITCH_FUSE_INCLUDE_DIR="${RUNNER_TEMP}/macfuse-sdk/include" \
            FILE_SNITCH_FUSE_LIB_DIR="${RUNNER_TEMP}/macfuse-sdk/lib" \
            ZIG_BUILD_TARGET="${{ matrix.zig_target }}" \
            ./scripts/release/build-release-artifact.sh \
              --version "${{ needs.source.outputs.version }}" \
              --platform "${{ matrix.platform }}" \
              --source-date-epoch "$source_date_epoch" \
              --output "$RUNNER_TEMP/$binary_asset.second"
          )

          cmp "$RUNNER_TEMP/$binary_asset" "$RUNNER_TEMP/$binary_asset.second"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/file-snitch-${{ needs.source.outputs.version }}-${{ matrix.asset_suffix }}.tar.gz
          if-no-files-found: error

  publish:
    needs:
      - source
      - build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Assemble release bundle
        run: |
          version="${{ needs.source.outputs.version }}"
          tag="${GITHUB_REF_NAME}"
          release_dir="$RUNNER_TEMP/release"
          mkdir -p "$release_dir"

          cp "$RUNNER_TEMP/artifacts/release-source/${{ needs.source.outputs.source_asset }}" "$release_dir/"
          cp "$RUNNER_TEMP/artifacts/release-linux-x86_64/file-snitch-$version-linux-x86_64.tar.gz" "$release_dir/"
          cp "$RUNNER_TEMP/artifacts/release-macos-arm64/file-snitch-$version-macos-arm64.tar.gz" "$release_dir/"

          (
            cd "$release_dir"
            for asset in \
              "${{ needs.source.outputs.source_asset }}" \
              "file-snitch-$version-linux-x86_64.tar.gz" \
              "file-snitch-$version-macos-arm64.tar.gz"; do
              printf '%s  %s\n' "$(python3 "${GITHUB_WORKSPACE}/scripts/release/sha256-file.py" "$asset")" "$asset"
            done > SHA256SUMS
          )

          python3 - <<'PY'
          import json
          import os
          import pathlib

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          release_dir = pathlib.Path(os.environ["RELEASE_DIR"])
          zig_inputs = json.loads(pathlib.Path("zig-toolchain.json").read_text(encoding="utf-8"))
          release_inputs = json.loads(pathlib.Path("release-inputs.json").read_text(encoding="utf-8"))
          manifest = {
              "version": version,
              "tag": tag,
              "build_inputs": {
                  "zig": zig_inputs,
                  "release_inputs": release_inputs,
              },
              "assets": [],
          }
          for asset in sorted(release_dir.iterdir()):
              if asset.name == "release-manifest.json":
                  continue
              if asset.is_file():
                  manifest["assets"].append({
                      "name": asset.name,
                      "sha256": next(
                          line.split()[0]
                          for line in (release_dir / "SHA256SUMS").read_text(encoding="utf-8").splitlines()
                          if line.endswith(asset.name)
                      ) if asset.name != "SHA256SUMS" else None,
                  })

          (release_dir / "release-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
        env:
          VERSION: ${{ needs.source.outputs.version }}
          TAG: ${{ github.ref_name }}
          RELEASE_DIR: ${{ runner.temp }}/release

      - name: Extract release notes
        run: |
          python3 ./scripts/release/extract-changelog-release.py \
            --changelog CHANGELOG.md \
            --version "${{ needs.source.outputs.version }}" > "$RUNNER_TEMP/release-notes.md"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            "$RUNNER_TEMP/release/${{ needs.source.outputs.source_asset }}" \
            "$RUNNER_TEMP/release/file-snitch-${{ needs.source.outputs.version }}-linux-x86_64.tar.gz" \
            "$RUNNER_TEMP/release/file-snitch-${{ needs.source.outputs.version }}-macos-arm64.tar.gz" \
            "$RUNNER_TEMP/release/SHA256SUMS" \
            "$RUNNER_TEMP/release/release-manifest.json"
