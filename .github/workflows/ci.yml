name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-24.04
    env:
      ZIG_CACHE_DIR: ${{ github.workspace }}/.zig-cache

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check shell scripts
        run: |
          mapfile -t shell_files < <(
            find scripts tests -type f -name '*.sh' | sort
          )
          bash -n "${shell_files[@]}"

      - name: Run shellcheck
        uses: reviewdog/action-shellcheck@f627b974d3005f993dc36f46d2cdf2684be18e5c # v1.9.0
        with:
          shellcheck_flags: '-x'

      - name: Check demo artifact redaction
        run: ./scripts/demo/check-demo-artifacts.sh

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            fuse3 \
            libfuse3-dev \
            pkg-config \
          ;

      - uses: ./.github/actions/setup-zig
        with:
          zig-cache-dir: ${{ env.ZIG_CACHE_DIR }}

      - name: Check docs
        run: ./scripts/docs/check-docs.sh

  build:
    runs-on: ubuntu-24.04
    env:
      ZIG_CACHE_DIR: ${{ github.workspace }}/.zig-cache
      ZIG_BUILD_TARGET: x86_64-linux-gnu

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            fuse3 \
            libfuse3-dev \
            pkg-config \
          ;

      - uses: ./.github/actions/setup-zig
        with:
          zig-cache-dir: ${{ env.ZIG_CACHE_DIR }}

      - run: ./tests/build.sh

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: file-snitch-linux
          path: zig-out/bin/file-snitch
          if-no-files-found: error

  build-macos:
    runs-on: macos-15
    env:
      ZIG_CACHE_DIR: ${{ github.workspace }}/.zig-cache
      ZIG_BUILD_TARGET: aarch64-macos

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract pinned macFUSE SDK
        run: |
          ./scripts/vendor/extract-macfuse-sdk.sh \
            --output "$RUNNER_TEMP/macfuse-sdk"

      - uses: ./.github/actions/setup-zig
        with:
          zig-cache-dir: ${{ env.ZIG_CACHE_DIR }}

      - name: Build and test macOS
        run: |
          sdkroot="$(xcrun --sdk macosx --show-sdk-path)"
          export SDKROOT="$sdkroot"
          export FILE_SNITCH_FUSE_INCLUDE_DIR="$RUNNER_TEMP/macfuse-sdk/include"
          export FILE_SNITCH_FUSE_LIB_DIR="$RUNNER_TEMP/macfuse-sdk/lib"
          export DYLD_LIBRARY_PATH="$RUNNER_TEMP/macfuse-sdk/lib"
          ./tests/build.sh

      - name: Smoke macOS fake osascript prompt
        run: |
          export DYLD_LIBRARY_PATH="$RUNNER_TEMP/macfuse-sdk/lib"
          ./tests/smoke/run-prompt-macos-ui-agent.sh

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: file-snitch-macos-arm64
          path: zig-out/bin/file-snitch
          if-no-files-found: error

  smoke-linux:
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux runtime dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            fuse3 \
          ;

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: file-snitch-linux
          path: zig-out/bin
      - run: chmod +x zig-out/bin/file-snitch

      - name: Setup FUSE
        run: |
          sudo modprobe fuse
          sudo chmod 666 /dev/fuse

      - run: ./tests/smoke/run-empty-policy.sh
      - run: ./tests/smoke/policy-lifecycle.sh
      - run: ./tests/smoke/doctor-debug-dossier.sh
      - run: ./tests/smoke/user-service-rendering.sh
      - run: ./tests/smoke/run-policy-reload.sh
      - run: ./tests/smoke/run-expired-decision-cleanup.sh
      - run: ./tests/smoke/run-single-enrollment.sh
      - run: ./tests/smoke/run-multi-mount.sh
      - run: ./tests/smoke/run-prompt-linux-ui.sh
      - run: ./tests/smoke/run-prompt-single.sh
      - run: ./tests/smoke/run-prompt-remembered-decision.sh
