name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts
        run: |
          mapfile -t shell_files < <(
            find scripts tests -type f -name '*.sh' | sort
          )
          bash -n "${shell_files[@]}"

      - name: Check demo artifact redaction
        run: ./scripts/demo/check-demo-artifacts.sh

  build:
    runs-on: ubuntu-24.04
    env:
      ZIG_INSTALL_DIR: ${{ github.workspace }}/.zig-toolchain/linux-x86_64
      ZIG_CACHE_DIR: ${{ github.workspace }}/.zig-cache
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-global-cache
      ZIG_BUILD_TARGET: x86_64-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            fuse3 \
            libfuse3-dev \
            pkg-config \
          ;

      - uses: ./.github/actions/setup-zig
        with:
          zig-install-dir: ${{ env.ZIG_INSTALL_DIR }}
          zig-cache-dir: ${{ env.ZIG_CACHE_DIR }}
          zig-global-cache-dir: ${{ env.ZIG_GLOBAL_CACHE_DIR }}

      - run: ./tests/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: file-snitch-linux
          path: zig-out/bin/file-snitch
          if-no-files-found: error

  smoke-linux:
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux runtime dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            fuse3 \
          ;

      - uses: actions/download-artifact@v4
        with:
          name: file-snitch-linux
          path: zig-out/bin
      - run: chmod +x zig-out/bin/file-snitch

      - name: Setup FUSE
        run: |
          sudo modprobe fuse
          sudo chmod 666 /dev/fuse

      - run: ./tests/smoke/run-empty-policy.sh
      - run: ./tests/smoke/policy-lifecycle.sh
      - run: ./tests/smoke/doctor-debug-dossier.sh
      - run: ./tests/smoke/user-service-rendering.sh
      - run: ./tests/smoke/run-policy-reload.sh
      - run: ./tests/smoke/run-expired-decision-cleanup.sh
      - run: ./tests/smoke/run-single-enrollment.sh
      - run: ./tests/smoke/run-multi-mount.sh
      - run: ./tests/smoke/run-prompt-linux-ui.sh
      - run: ./tests/smoke/run-prompt-single.sh
      - run: ./tests/smoke/run-prompt-remembered-decision.sh
