name: Setup Zig
description: Install Anyzig and restore Zig caches.

inputs:
  zig-cache-dir:
    description: Directory for Zig local build cache.
    required: true

runs:
  using: composite
  steps:
    - name: Install Anyzig
      shell: bash
      run: |
        set -euo pipefail

        case "${RUNNER_OS}-${RUNNER_ARCH}" in
          Linux-X64)
            anyzig_asset="anyzig-x86_64-linux.tar.gz"
            ;;
          macOS-ARM64)
            anyzig_asset="anyzig-aarch64-macos.tar.gz"
            ;;
          *)
            echo "unsupported Anyzig host platform: ${RUNNER_OS}-${RUNNER_ARCH}" >&2
            exit 1
            ;;
        esac

        anyzig_dir="$RUNNER_TEMP/anyzig"
        mkdir -p "$anyzig_dir"
        curl -L "https://github.com/marler8997/anyzig/releases/latest/download/${anyzig_asset}" \
          | tar -xz -C "$anyzig_dir"
        echo "$anyzig_dir" >> "$GITHUB_PATH"

    - name: Restore Zig build caches
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          ${{ inputs.zig-cache-dir }}
          ~/.cache/zig
        key: zig-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon', 'build.zig', 'build/**/*.zig') }}
        restore-keys: |
          zig-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig.zon') }}-
          zig-build-${{ runner.os }}-${{ runner.arch }}-
